{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo Cáo Thống Kê</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'app/static/menu.css' %}" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'user_menu' %}">
                <i class="fas fa-arrow-left"></i> Quay lại
            </a>
        </div>
    </nav>
    <div class="container mt-4">
        <h3>Báo Cáo Điểm Danh</h3>
        <table class="table table-bordered table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Timestamp</th>
                    <th>Received At</th>
                </tr>
            </thead>
            <tbody>
                {% for event in events %}
                <tr>
                    <td>{{ event.card_id }}</td>
                    <td>{{ event.timestamp }}</td>
                    <td>{{ event.created_at|date:'d/m/Y H:i:s' }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3">Chưa có dữ liệu</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
        const socket = new WebSocket("wss://" + window.location.host + "/ws/esp32/");

    socket.onmessage = function(event) {
    const data = JSON.parse(event.data);
    console.log("📡 Dữ liệu realtime:", data);

    const tableBody = document.querySelector("table tbody");

    const newRow = document.createElement("tr");

    newRow.innerHTML = `
        <td>${data.card_id || 'N/A'}</td>
        <td>${data.timestamp || 'N/A'}</td>
        <td>${new Date().toLocaleString('vi-VN')}</td>
    `;
                    
    // Thêm vào đầu bảng (dòng mới nhất trên đầu)
    tableBody.prepend(newRow);
};

socket.onerror = function(error) {
    console.error("WebSocket error:", error);
};
    </script>
</body>
</html>
